<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quan Ly Quan Bida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f1923; color: #e0e0e0; min-height: 100vh; --bs-secondary-color: rgba(224, 224, 224, 0.65); }
        .navbar { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; }

        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            padding: 16px 0;
        }

        .table-card {
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .table-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .card-available {
            background: linear-gradient(135deg, #1b4332, #2d6a4f);
            border: 2px solid #40916c;
        }
        .card-available:hover { border-color: #52b788; }

        .card-playing {
            background: linear-gradient(135deg, #641220, #85182a);
            border: 2px solid #a4161a;
            animation: pulse-border 2s infinite;
        }
        .card-playing:hover { border-color: #e5383b; }

        .card-paused {
            background: linear-gradient(135deg, #5a3d00, #7a5200);
            border: 2px solid #d4a017;
            animation: pulse-border-yellow 2s infinite;
        }
        @keyframes pulse-border-yellow {
            0%, 100% { border-color: #d4a017; }
            50% { border-color: #ffd166; }
        }

        .card-reserved {
            background: linear-gradient(135deg, #1a365d, #2a4a7f);
            border: 2px solid #3182ce;
        }

        .card-maintenance {
            background: linear-gradient(135deg, #333, #555);
            border: 2px solid #888;
            cursor: not-allowed;
            opacity: 0.7;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: #a4161a; }
            50% { border-color: #e5383b; }
        }

        .table-name { font-size: 1.2rem; font-weight: 700; }
        .table-type-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .tag-pool { background: rgba(13,110,253,0.3); color: #6ea8fe; }
        .tag-carom { background: rgba(25,135,84,0.3); color: #75b798; }
        .tag-vip { background: rgba(255,193,7,0.3); color: #ffda6a; }

        .playing-time {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
        }
        .playing-amount {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffd166;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .dot-available { background-color: #52b788; box-shadow: 0 0 8px #52b788; }
        .dot-playing { background-color: #e5383b; box-shadow: 0 0 8px #e5383b; }
        .dot-paused { background-color: #ffd166; box-shadow: 0 0 8px #ffd166; }
        .dot-reserved { background-color: #3182ce; box-shadow: 0 0 8px #3182ce; }
        .dot-maintenance { background-color: #888; }

        .holiday-badge {
            background: linear-gradient(135deg, #dc3545, #fd7e14);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 5px rgba(220,53,69,0.5); }
            to { box-shadow: 0 0 15px rgba(220,53,69,0.8); }
        }

        .stats-bar {
            display: flex; gap: 12px; padding: 12px 0; flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-number { font-size: 1.3rem; font-weight: 800; }

        .modal-content { background: #1a2332; color: #e0e0e0; border: 1px solid #2a3a4a; }
        .modal-header { border-bottom-color: #2a3a4a; }
        .modal-footer { border-top-color: #2a3a4a; }

        .order-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #dc3545;
            border-radius: 50%;
            width: 24px; height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
        }
    </style>
</head>
<body x-data="dashboardApp()" x-init="init()">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="bi bi-circle-fill text-success me-2"></i>Quan Ly Quan Bida
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <div class="navbar-nav me-auto">
                <a class="nav-link active" th:href="@{/dashboard}">
                    <i class="bi bi-grid-3x3-gap"></i> Dashboard
                </a>
                <a class="nav-link" th:href="@{/admin/tables}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-table"></i> Ban
                </a>
                <a class="nav-link" th:href="@{/admin/prices}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-currency-dollar"></i> Gia
                </a>
                <a class="nav-link" th:href="@{/admin/products}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-cup-straw"></i> San pham
                </a>
                <a class="nav-link" th:href="@{/admin/invoices}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-receipt"></i> Hoa don
                </a>
                <a class="nav-link" th:href="@{/admin/customers}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-people"></i> Khach hang
                </a>
                <a class="nav-link" th:href="@{/admin/holidays}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-calendar-heart"></i> Ngay le
                </a>
                <a class="nav-link" th:href="@{/admin/staff}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-person-badge"></i> Nhan vien
                </a>
                <a class="nav-link" th:href="@{/admin/discount-codes}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-ticket"></i> Ma giam gia
                </a>
                <a class="nav-link" th:href="@{/admin/reports}" sec:authorize="hasRole('ADMIN')">
                    <i class="bi bi-bar-chart-line"></i> Bao cao
                </a>
            </div>
            <div class="navbar-nav align-items-center gap-2">
                <span th:if="${holidayMode}" class="holiday-badge">
                    <i class="bi bi-sun-fill me-1"></i>HOLIDAY MODE
                </span>
                <span th:if="${isCalendarHoliday}" class="holiday-badge" style="background: linear-gradient(135deg, #6f42c1, #d63384)">
                    <i class="bi bi-calendar-event me-1"></i>NGAY LE
                </span>
                <span class="nav-link text-light">
                    <i class="bi bi-person-circle me-1"></i>
                    <span sec:authentication="name"></span>
                </span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 mt-3">

    <!-- Stats bar -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="text-muted small">Tong ban</div>
            <div class="stat-number text-info" x-text="tables.length">0</div>
        </div>
        <div class="stat-item">
            <div class="text-muted small">Dang choi</div>
            <div class="stat-number text-danger" x-text="tables.filter(t => t.status === 'PLAYING').length">0</div>
        </div>
        <div class="stat-item">
            <div class="text-muted small">Tam dung</div>
            <div class="stat-number text-warning" x-text="tables.filter(t => t.status === 'PAUSED').length">0</div>
        </div>
        <div class="stat-item">
            <div class="text-muted small">Dat truoc</div>
            <div class="stat-number text-primary" x-text="tables.filter(t => t.status === 'RESERVED').length">0</div>
        </div>
        <div class="stat-item">
            <div class="text-muted small">Trong</div>
            <div class="stat-number text-success" x-text="tables.filter(t => t.status === 'AVAILABLE').length">0</div>
        </div>
        <div class="stat-item">
            <div class="text-muted small">
                <i class="bi bi-clock me-1"></i>Cap nhat
            </div>
            <div class="stat-number text-warning" style="font-size:1rem" x-text="lastUpdate">--:--</div>
        </div>
    </div>

    <!-- Grid ban -->
    <div class="table-grid">
        <template x-for="table in tables" :key="table.id">
            <div class="table-card"
                 :class="getCardClass(table)"
                 @click="handleClick(table)">

                <!-- Order count badge -->
                <template x-if="table.orderCount > 0">
                    <div class="order-badge" x-text="table.orderCount"></div>
                </template>

                <!-- Header: ten + loai -->
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div class="table-name" x-text="table.name"></div>
                    <span class="table-type-tag"
                          :class="'tag-' + table.tableType.toLowerCase()"
                          x-text="table.tableType"></span>
                </div>

                <!-- Trang thai -->
                <div class="mb-2">
                    <span class="status-dot" :class="getStatusDot(table.status)"></span>
                    <span x-text="getStatusLabel(table.status)"
                          :class="getStatusTextClass(table.status)"
                          style="font-size:0.85rem; font-weight:600"></span>
                </div>

                <!-- Customer info -->
                <template x-if="table.customerName">
                    <div class="small text-light mb-1">
                        <i class="bi bi-person-fill me-1"></i><span x-text="table.customerName"></span>
                    </div>
                </template>

                <!-- Thong tin phien (neu dang choi/tam dung) -->
                <template x-if="table.status === 'PLAYING' || table.status === 'PAUSED'">
                    <div>
                        <div class="playing-time" x-text="formatTime(table.playingMinutes)"></div>
                        <div class="playing-amount" x-text="formatMoney(table.currentAmount) + ' VND'"></div>
                        <template x-if="table.totalPausedMinutes > 0">
                            <div class="small text-warning mt-1">
                                <i class="bi bi-pause-circle me-1"></i>Da tam dung: <span x-text="table.totalPausedMinutes"></span> phut
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Neu dat truoc -->
                <template x-if="table.status === 'RESERVED'">
                    <div class="mt-2">
                        <div class="small"><i class="bi bi-calendar-check me-1"></i>Dat truoc</div>
                        <div class="small text-info" x-text="table.reservationCustomerName || ''"></div>
                    </div>
                </template>

                <!-- Neu bao tri -->
                <template x-if="table.status === 'MAINTENANCE'">
                    <div class="text-center mt-3" style="opacity:0.6">
                        <i class="bi bi-wrench" style="font-size:2.5rem"></i>
                        <div class="small mt-1">Dang bao tri</div>
                    </div>
                </template>

                <!-- Neu trong -->
                <template x-if="table.status === 'AVAILABLE'">
                    <div class="text-center mt-3" style="opacity:0.5">
                        <i class="bi bi-play-circle" style="font-size:2.5rem"></i>
                        <div class="small mt-1">Nhan de bat dau</div>
                    </div>
                </template>
            </div>
        </template>
    </div>
</div>

<!-- Modal xac nhan -->
<div class="modal fade" id="actionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" x-text="modalTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p x-text="modalMessage"></p>

                <!-- START: Customer selection -->
                <template x-if="selectedTable && selectedTable.status === 'AVAILABLE'">
                    <div class="mb-3">
                        <label class="form-label small">Khach hang (tuy chon)</label>
                        <select class="form-select bg-dark text-light border-secondary" x-model="selectedCustomerId">
                            <option value="">-- Khach vang lai --</option>
                            <template x-for="c in customers" :key="c.id">
                                <option :value="c.id" x-text="c.name + ' - ' + c.phone"></option>
                            </template>
                        </select>
                    </div>
                </template>

                <!-- END: Billing info -->
                <template x-if="selectedTable && (selectedTable.status === 'PLAYING' || selectedTable.status === 'PAUSED')">
                    <div>
                        <div class="text-center mb-3">
                            <div class="playing-amount fs-2 fw-bold text-warning"
                                 x-text="formatMoney(selectedTable.currentAmount) + ' VND'"></div>
                            <div class="text-muted">Thoi gian: <span x-text="formatTime(selectedTable.playingMinutes)"></span></div>
                        </div>

                        <!-- Manual Price Override -->
                        <div class="mb-3 p-3 border border-warning rounded-2" style="background: rgba(255,193,7,0.05)">
                            <label class="form-label small fw-semibold mb-2">
                                <i class="bi bi-pencil-square me-1"></i>Gia ban (tuy chon - de trong la dung gia tu dong)
                            </label>
                            <div class="input-group input-group-sm">
                                <input type="number" class="form-control bg-dark text-light border-secondary"
                                       x-model="manualTableCharge"
                                       placeholder="Nhap gia ban (VND)"
                                       min="0">
                                <span class="input-group-text bg-dark text-light border-secondary">VND</span>
                                <button class="btn btn-outline-warning btn-sm" type="button" @click="manualTableCharge = ''">
                                    <i class="bi bi-x"></i> Xoa
                                </button>
                            </div>
                            <small class="text-muted d-block mt-1">
                                Tien ban tu dong: <span x-text="formatMoney(selectedTable.currentAmount)"></span> VND
                            </small>
                        </div>

                        <!-- Action buttons for PLAYING/PAUSED -->
                        <div class="d-flex gap-2 justify-content-center mb-3">
                            <template x-if="selectedTable.status === 'PLAYING'">
                                <button class="btn btn-warning btn-sm" @click="pauseTable()">
                                    <i class="bi bi-pause-fill"></i> Tam dung
                                </button>
                            </template>
                            <template x-if="selectedTable.status === 'PAUSED'">
                                <button class="btn btn-success btn-sm" @click="resumeTable()">
                                    <i class="bi bi-play-fill"></i> Tiep tuc
                                </button>
                            </template>
                            <button class="btn btn-info btn-sm" @click="showOrderPanel()">
                                <i class="bi bi-cup-straw"></i> Goi mon (<span x-text="selectedTable.orderCount || 0"></span>)
                            </button>
                        </div>

                        <!-- Discount Code Input (Phase 2) -->
                        <div class="mb-3 p-3 border border-info rounded-2" style="background: rgba(13,110,253,0.05)">
                            <label class="form-label small fw-semibold mb-2">
                                <i class="bi bi-ticket me-1"></i>Mã giảm giá (tùy chọn)
                            </label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control bg-dark text-light border-secondary"
                                       x-model="discountCode"
                                       placeholder="Nhập mã giảm giá"
                                       @keyup.enter="validateDiscountCode()">
                                <button class="btn btn-outline-info btn-sm" type="button" @click="clearDiscountCode()">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                            <!-- Discount preview (if validation succeeds) -->
                            <template x-if="validatedCodeDiscount !== null">
                                <div class="mt-2 p-2 bg-dark border border-success rounded small text-light">
                                    <div>Membership: <span x-text="formatMoney(calculatedMembershipDiscount)"></span> VND</div>
                                    <div>Code: <span x-text="formatMoney(validatedCodeDiscount)"></span> VND</div>
                                    <div class="fw-bold">Tổng giảm: <span x-text="formatMoney(calculatedMembershipDiscount + validatedCodeDiscount)"></span> VND</div>
                                    <div class="fw-bold text-warning">Final: <span x-text="formatMoney(calculatedFinalTotal)"></span> VND</div>
                                </div>
                            </template>
                            <!-- Error (if validation fails) -->
                            <template x-if="discountError">
                                <small class="text-danger d-block mt-1">
                                    <i class="bi bi-exclamation-circle"></i> <span x-text="discountError"></span>
                                </small>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Order Panel -->
                <template x-if="showOrders">
                    <div class="border border-secondary rounded p-3 mt-2">
                        <h6><i class="bi bi-cup-straw me-1"></i>Goi mon</h6>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <select class="form-select form-select-sm bg-dark text-light border-secondary"
                                        x-model="orderProductId">
                                    <option value="">-- Chon san pham --</option>
                                    <template x-for="p in products" :key="p.id">
                                        <option :value="p.id" x-text="p.name + ' (' + formatMoney(p.price) + 'd)'"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="col-3">
                                <input type="number" class="form-control form-control-sm bg-dark text-light border-secondary"
                                       x-model="orderQuantity" min="1" value="1" placeholder="SL">
                            </div>
                            <div class="col-3">
                                <button class="btn btn-success btn-sm w-100" @click="addOrder()">
                                    <i class="bi bi-plus"></i> Them
                                </button>
                            </div>
                        </div>
                        <!-- Order list -->
                        <template x-if="orderItems.length > 0">
                            <div>
                                <table class="table table-dark table-sm">
                                    <thead><tr><th>Mon</th><th>SL</th><th>Thanh tien</th><th></th></tr></thead>
                                    <tbody>
                                        <template x-for="item in orderItems" :key="item.id">
                                            <tr>
                                                <td x-text="item.productName"></td>
                                                <td x-text="item.quantity"></td>
                                                <td x-text="formatMoney(item.amount) + 'd'"></td>
                                                <td>
                                                    <button class="btn btn-outline-danger btn-sm py-0 px-1"
                                                            @click="removeOrder(item.id)">
                                                        <i class="bi bi-trash"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Dong</button>
                <template x-if="selectedTable && selectedTable.status === 'AVAILABLE'">
                    <button type="button" class="btn btn-success" @click="confirmStart()">
                        <i class="bi bi-play-fill"></i> Bat dau
                    </button>
                </template>
                <template x-if="selectedTable && selectedTable.status === 'RESERVED'">
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-success" @click="confirmStartReserved()">
                            <i class="bi bi-play-fill"></i> Bat dau (khach da den)
                        </button>
                        <button type="button" class="btn btn-danger" @click="cancelReservation()">
                            <i class="bi bi-x"></i> Huy dat
                        </button>
                    </div>
                </template>
                <template x-if="selectedTable && (selectedTable.status === 'PLAYING' || selectedTable.status === 'PAUSED')">
                    <button type="button" class="btn btn-warning" @click="confirmEnd()">
                        <i class="bi bi-stop-fill"></i> Ket thuc & Tinh tien
                    </button>
                </template>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center text-white border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" x-text="toastMessage"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js" defer></script>

<script>
function dashboardApp() {
    return {
        tables: [],
        selectedTable: null,
        modalTitle: '',
        modalMessage: '',
        toastMessage: '',
        lastUpdate: '--:--',
        stompClient: null,
        pollInterval: null,
        manualTableCharge: '',

        // Phase 2: Customer & Order
        customers: /*[[${customers != null ? customers : '[]'}]]*/ [],
        products: /*[[${products != null ? products : '[]'}]]*/ [],
        selectedCustomerId: '',
        showOrders: false,
        orderItems: [],
        orderProductId: '',
        orderQuantity: 1,

        // Phase 2: Discount code
        discountCode: '',
        validatedCodeDiscount: null,
        discountError: '',
        calculatedMembershipDiscount: 0,
        calculatedFinalTotal: 0,

        init() {
            this.fetchTables();
            this.connectWebSocket();
            this.pollInterval = setInterval(() => this.fetchTables(), 30000);
        },

        async fetchTables() {
            try {
                const res = await fetch('/api/tables');
                if (res.ok) {
                    this.tables = await res.json();
                    this.lastUpdate = new Date().toLocaleTimeString('vi-VN');
                }
            } catch (e) { console.error('Fetch error:', e); }
        },

        connectWebSocket() {
            try {
                const socket = new SockJS('/ws');
                this.stompClient = Stomp.over(socket);
                this.stompClient.debug = null;
                this.stompClient.connect({}, (frame) => {
                    this.stompClient.subscribe('/topic/tables', (message) => {
                        this.tables = JSON.parse(message.body);
                        this.lastUpdate = new Date().toLocaleTimeString('vi-VN');
                    });
                }, (error) => {
                    setTimeout(() => this.connectWebSocket(), 5000);
                });
            } catch (e) { console.error('WebSocket init error:', e); }
        },

        getCardClass(table) {
            switch(table.status) {
                case 'PLAYING': return 'card-playing';
                case 'PAUSED': return 'card-paused';
                case 'RESERVED': return 'card-reserved';
                case 'MAINTENANCE': return 'card-maintenance';
                default: return 'card-available';
            }
        },

        getStatusDot(status) {
            return 'dot-' + status.toLowerCase();
        },

        getStatusLabel(status) {
            const labels = { AVAILABLE: 'Trong', PLAYING: 'Dang choi', PAUSED: 'Tam dung', RESERVED: 'Dat truoc', MAINTENANCE: 'Bao tri' };
            return labels[status] || status;
        },

        getStatusTextClass(status) {
            const classes = { AVAILABLE: 'text-success', PLAYING: 'text-danger', PAUSED: 'text-warning', RESERVED: 'text-info', MAINTENANCE: 'text-secondary' };
            return classes[status] || '';
        },

        handleClick(table) {
            if (table.status === 'MAINTENANCE') return;
            this.selectedTable = table;
            this.showOrders = false;
            this.orderItems = [];
            this.selectedCustomerId = '';
            this.manualTableCharge = '';

            if (table.status === 'AVAILABLE') {
                this.modalTitle = 'Bat dau phien choi';
                this.modalMessage = `Bat dau phien choi cho ${table.name} (${table.tableType})?`;
            } else if (table.status === 'RESERVED') {
                this.modalTitle = 'Ban dat truoc';
                this.modalMessage = `${table.name} - Dat truoc boi ${table.reservationCustomerName || 'N/A'}`;
            } else {
                this.modalTitle = `${table.name} - ${this.getStatusLabel(table.status)}`;
                this.modalMessage = '';
                this.loadOrders(table.id);
            }
            new bootstrap.Modal(document.getElementById('actionModal')).show();
        },

        async confirmStart() {
            if (!this.selectedTable) return;
            const url = `/api/tables/${this.selectedTable.id}/start` +
                (this.selectedCustomerId ? `?customerId=${this.selectedCustomerId}` : '');
            await this.postAction(url, 'Da bat dau phien choi');
        },

        async confirmStartReserved() {
            if (!this.selectedTable) return;
            await this.postAction(`/api/tables/${this.selectedTable.id}/start`, 'Da bat dau phien choi');
        },

        async cancelReservation() {
            // TODO: Need reservation ID - for now just show toast
            this.showToast('Chuc nang huy dat ban qua dashboard dang phat trien', 'warning');
        },

        async confirmEnd() {
            if (!this.selectedTable) return;
            try {
                let url = `/api/tables/${this.selectedTable.id}/end`;
                const params = [];
                if (this.manualTableCharge) {
                    params.push(`manualTableCharge=${this.manualTableCharge}`);
                }
                if (this.discountCode) {
                    params.push(`discountCode=${encodeURIComponent(this.discountCode)}`);
                }
                if (params.length > 0) {
                    url += '?' + params.join('&');
                }
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    let msg = data.message;
                    if (data.invoiceNumber) msg += ` | HD: ${data.invoiceNumber}`;
                    if (data.invoiceTotal) msg += ` | Tong: ${this.formatMoney(data.invoiceTotal)} VND`;
                    else if (data.totalAmount) msg += ` | Tong: ${this.formatMoney(data.totalAmount)} VND`;
                    this.showToast(msg, 'success');
                    this.fetchTables();
                } else {
                    this.showToast(data.message, 'danger');
                }
            } catch (e) {
                this.showToast('Loi ket noi server', 'danger');
            }
            bootstrap.Modal.getInstance(document.getElementById('actionModal'))?.hide();
            this.manualTableCharge = '';
            this.discountCode = '';
            this.validatedCodeDiscount = null;
            this.discountError = '';
        },

        async pauseTable() {
            if (!this.selectedTable) return;
            await this.postAction(`/api/tables/${this.selectedTable.id}/pause`, 'Da tam dung');
        },

        async resumeTable() {
            if (!this.selectedTable) return;
            await this.postAction(`/api/tables/${this.selectedTable.id}/resume`, 'Da tiep tuc');
        },

        async postAction(url, successMsg) {
            try {
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    this.showToast(data.message || successMsg, 'success');
                    this.fetchTables();
                } else {
                    this.showToast(data.message, 'danger');
                }
            } catch (e) {
                this.showToast('Loi ket noi server', 'danger');
            }
            bootstrap.Modal.getInstance(document.getElementById('actionModal'))?.hide();
        },

        // ---- Order functions ----
        showOrderPanel() {
            this.showOrders = !this.showOrders;
            if (this.showOrders && this.selectedTable) {
                this.loadOrders(this.selectedTable.id);
            }
        },

        async loadOrders(tableId) {
            try {
                const res = await fetch(`/api/tables/${tableId}/orders`);
                if (res.ok) {
                    this.orderItems = await res.json();
                }
            } catch (e) { console.error('Load orders error:', e); }
        },

        async addOrder() {
            if (!this.orderProductId || !this.selectedTable) return;
            try {
                const res = await fetch(`/api/tables/${this.selectedTable.id}/orders?productId=${this.orderProductId}&quantity=${this.orderQuantity || 1}`, {
                    method: 'POST'
                });
                const data = await res.json();
                if (data.success) {
                    this.showToast(data.message, 'success');
                    this.loadOrders(this.selectedTable.id);
                    this.orderProductId = '';
                    this.orderQuantity = 1;
                    this.fetchTables();
                } else {
                    this.showToast(data.message, 'danger');
                }
            } catch (e) {
                this.showToast('Loi goi mon', 'danger');
            }
        },

        async removeOrder(orderItemId) {
            try {
                const res = await fetch(`/api/tables/orders/${orderItemId}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    this.loadOrders(this.selectedTable.id);
                    this.fetchTables();
                    this.showToast('Da xoa mon', 'success');
                } else {
                    this.showToast(data.message, 'danger');
                }
            } catch (e) { this.showToast('Loi xoa mon', 'danger'); }
        },

        // Phase 2: Discount code validation and calculation
        clearDiscountCode() {
            this.discountCode = '';
            this.validatedCodeDiscount = null;
            this.discountError = '';
        },

        validateDiscountCode() {
            if (!this.discountCode || this.discountCode.trim() === '') {
                this.discountError = '';
                this.validatedCodeDiscount = null;
                return;
            }

            // Simple client-side validation on submit - actual validation happens in confirmEnd()
            // Just clear errors and calculate preview
            this.discountError = '';

            // Calculate membership discount
            const subtotal = this.selectedTable.currentAmount;
            this.calculatedMembershipDiscount = subtotal * 0.05; // Placeholder - real value from membership tier

            // For now, just show that code is ready to submit
            // Actual validation happens on server
            this.validatedCodeDiscount = 0; // Will be calculated on server
            this.calculatedFinalTotal = subtotal - this.calculatedMembershipDiscount - this.validatedCodeDiscount;
        },

        formatTime(minutes) {
            if (!minutes || minutes < 0) return '0:00';
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return `${h}:${String(m).padStart(2, '0')}`;
        },

        formatMoney(amount) {
            if (!amount) return '0';
            return new Intl.NumberFormat('vi-VN').format(Math.round(amount));
        },

        showToast(message, type) {
            this.toastMessage = message;
            const toastEl = document.getElementById('toast');
            toastEl.className = `toast align-items-center text-white border-0 bg-${type || 'info'}`;
            new bootstrap.Toast(toastEl, { delay: 4000 }).show();
        }
    };
}
</script>
