<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mã giảm giá - Quản Lý Quán Bida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .navbar { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; }
        .status-active { color: #198754; font-weight: 600; }
        .status-inactive { color: #dc3545; font-weight: 600; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="bi bi-circle-fill text-success me-2"></i>Quản Lý Quán Bida
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <div class="navbar-nav me-auto">
                <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-3x3-gap"></i> Dashboard</a>
                <a class="nav-link" th:href="@{/admin/tables}"><i class="bi bi-table"></i> Ban</a>
                <a class="nav-link" th:href="@{/admin/prices}"><i class="bi bi-currency-dollar"></i> Gia</a>
                <a class="nav-link" th:href="@{/admin/products}"><i class="bi bi-cup-straw"></i> San pham</a>
                <a class="nav-link" th:href="@{/admin/invoices}"><i class="bi bi-receipt"></i> Hoa don</a>
                <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Khach hang</a>
                <a class="nav-link" th:href="@{/admin/holidays}"><i class="bi bi-calendar-heart"></i> Ngay le</a>
                <a class="nav-link" th:href="@{/admin/staff}"><i class="bi bi-person-badge"></i> Nhan vien</a>
                <a class="nav-link active" th:href="@{/admin/discount-codes}"><i class="bi bi-ticket"></i> Ma giam gia</a>
                <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-bar-chart-line"></i> Bao cao</a>
            </div>
            <div class="navbar-nav align-items-center gap-2">
                <span class="nav-link text-light"><i class="bi bi-person-circle me-1"></i><span sec:authentication="name"></span></span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-ticket me-2"></i>Quản Lý Mã Giảm Giá</h3>
        <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#addForm">
            <i class="bi bi-plus-lg me-1"></i>Thêm mã mới
        </button>
    </div>

    <!-- Form thêm mã -->
    <div class="collapse mb-4" id="addForm">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">Thêm mã giảm giá mới</h5>
                <form th:action="@{/admin/discount-codes}" method="post" class="row g-3 align-items-end">
                    <div class="col-md-2">
                        <label class="form-label">Mã</label>
                        <input type="text" name="code" class="form-control" placeholder="VD: SUMMER50" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Giảm (%)</label>
                        <input type="number" name="discountPercent" class="form-control" step="0.01" placeholder="10" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Max dùng</label>
                        <input type="number" name="maxUsageCount" class="form-control" placeholder="Không giới hạn">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Hết hạn</label>
                        <input type="date" name="expiryDateStr" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-plus-circle me-1"></i>Thêm
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bảng danh sách -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Mã</th>
                        <th class="text-center">Giảm (%)</th>
                        <th class="text-center">Đã dùng</th>
                        <th class="text-center">Max dùng</th>
                        <th class="text-center">Hết hạn</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="code, iter : ${codes}">
                        <td th:text="${iter.count}"></td>
                        <td class="fw-semibold" th:text="${code.code}"></td>
                        <td class="text-center" th:text="${code.discountPercent}"></td>
                        <td class="text-center" th:text="${code.usageCount}"></td>
                        <td class="text-center" th:text="${code.maxUsageCount ?: 'Không giới hạn'}"></td>
                        <td class="text-center" th:text="${code.expiryDate ?: 'Không có'}"></td>
                        <td>
                            <span th:if="${code.active}" class="status-active">
                                <i class="bi bi-check-circle-fill me-1"></i>Hoạt động
                            </span>
                            <span th:unless="${code.active}" class="status-inactive">
                                <i class="bi bi-x-circle-fill me-1"></i>Vô hiệu
                            </span>
                        </td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary me-1"
                                    data-bs-toggle="modal" data-bs-target="#editModal"
                                    th:data-id="${code.id}"
                                    th:data-code="${code.code}"
                                    th:data-percent="${code.discountPercent}"
                                    th:data-max="${code.maxUsageCount}"
                                    th:data-expiry="${code.expiryDate}">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <form th:action="@{/admin/discount-codes/{id}/toggle(id=${code.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm"
                                        th:classappend="${code.active} ? 'btn-outline-danger' : 'btn-outline-success'"
                                        title="Toggle">
                                    <i class="bi" th:classappend="${code.active} ? 'bi-toggle-on' : 'bi-toggle-off'"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/discount-codes/{id}/delete(id=${code.id})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Xác nhận xóa mã này?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(codes)}">
                        <td colspan="8" class="text-center text-muted py-4">Chưa có mã giảm giá nào</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p class="text-muted mt-3">
        <i class="bi bi-info-circle me-1"></i>
        Tổng: <strong th:text="${#lists.size(codes)}">0</strong> mã
    </p>
</div>

<!-- Modal sửa mã -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="editForm" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Sửa mã giảm giá</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Mã</label>
                        <input type="text" name="code" id="editCode" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giảm (%)</label>
                        <input type="number" name="discountPercent" id="editPercent" class="form-control" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Max dùng</label>
                        <input type="number" name="maxUsageCount" id="editMax" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hết hạn</label>
                        <input type="date" name="expiryDateStr" id="editExpiry" class="form-control">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Cập nhật
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Fill edit modal with data
    document.getElementById('editModal').addEventListener('show.bs.modal', function (e) {
        const btn = e.relatedTarget;
        const id = btn.getAttribute('data-id');
        const code = btn.getAttribute('data-code');
        const percent = btn.getAttribute('data-percent');
        const max = btn.getAttribute('data-max');
        const expiry = btn.getAttribute('data-expiry');

        document.getElementById('editForm').action = '/admin/discount-codes/' + id + '/edit';
        document.getElementById('editCode').value = code;
        document.getElementById('editPercent').value = percent;
        document.getElementById('editMax').value = max || '';
        document.getElementById('editExpiry').value = expiry || '';
    });

    // Auto-dismiss alerts
    setTimeout(function() {
        document.querySelectorAll('.alert').forEach(function(el) {
            new bootstrap.Alert(el).close();
        });
    }, 4000);
</script>

</body>
</html>
