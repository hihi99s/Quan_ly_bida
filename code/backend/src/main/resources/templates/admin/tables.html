<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bàn - Quản Lý Quán Bida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .navbar { background: linear-gradient(135deg, #1a1a2e, #16213e) !important; }
        .table-type-badge {
            font-size: 0.75rem; padding: 4px 10px; border-radius: 20px;
        }
        .badge-pool { background-color: #0d6efd; color: white; }
        .badge-carom { background-color: #198754; color: white; }
        .badge-vip { background-color: #dc3545; color: white; }
        .status-available { color: #198754; font-weight: 600; }
        .status-playing { color: #dc3545; font-weight: 600; }
        .status-paused { color: #ffc107; font-weight: 600; }
        .status-reserved { color: #0d6efd; font-weight: 600; }
        .status-maintenance { color: #6c757d; font-weight: 600; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="bi bi-circle-fill text-success me-2"></i>Quản Lý Quán Bida
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <div class="navbar-nav me-auto">
                <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-grid-3x3-gap"></i> Dashboard</a>
                <a class="nav-link active" th:href="@{/admin/tables}"><i class="bi bi-table"></i> Ban</a>
                <a class="nav-link" th:href="@{/admin/prices}"><i class="bi bi-currency-dollar"></i> Gia</a>
                <a class="nav-link" th:href="@{/admin/products}"><i class="bi bi-cup-straw"></i> San pham</a>
                <a class="nav-link" th:href="@{/admin/invoices}"><i class="bi bi-receipt"></i> Hoa don</a>
                <a class="nav-link" th:href="@{/admin/customers}"><i class="bi bi-people"></i> Khach hang</a>
                <a class="nav-link" th:href="@{/admin/holidays}"><i class="bi bi-calendar-heart"></i> Ngay le</a>
                <a class="nav-link" th:href="@{/admin/staff}"><i class="bi bi-person-badge"></i> Nhan vien</a>
                <a class="nav-link" th:href="@{/admin/discount-codes}"><i class="bi bi-ticket"></i> Ma giam gia</a>
                <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-bar-chart-line"></i> Bao cao</a>
            </div>
            <div class="navbar-nav align-items-center gap-2">
                <span class="nav-link text-light"><i class="bi bi-person-circle me-1"></i><span sec:authentication="name"></span></span>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-light btn-sm"><i class="bi bi-box-arrow-right"></i></button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-table me-2"></i>Quản Lý Bàn Bida</h3>
        <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#addForm">
            <i class="bi bi-plus-lg me-1"></i>Thêm bàn mới
        </button>
    </div>

    <!-- Form thêm bàn -->
    <div class="collapse mb-4" id="addForm">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">Thêm bàn mới</h5>
                <form th:action="@{/admin/tables}" method="post" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label">Tên bàn</label>
                        <input type="text" name="name" class="form-control" placeholder="VD: Pool 05" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Loại bàn</label>
                        <select name="tableType" class="form-select" required>
                            <option th:each="type : ${tableTypes}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-plus-circle me-1"></i>Thêm
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bảng danh sách -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Tên bàn</th>
                        <th>Loại</th>
                        <th>Trạng thái</th>
                        <th>Ngày tạo</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="table, iter : ${tables}">
                        <td th:text="${iter.count}"></td>
                        <td class="fw-semibold" th:text="${table.name}"></td>
                        <td>
                            <span class="table-type-badge"
                                  th:classappend="${table.tableType.name() == 'POOL'} ? 'badge-pool' :
                                                 (${table.tableType.name() == 'CAROM'} ? 'badge-carom' : 'badge-vip')"
                                  th:text="${table.tableType}"></span>
                        </td>
                        <td>
                            <span th:if="${table.status.name() == 'AVAILABLE'}" class="status-available">
                                <i class="bi bi-circle-fill me-1" style="font-size:0.5rem"></i>Trong
                            </span>
                            <span th:if="${table.status.name() == 'PLAYING'}" class="status-playing">
                                <i class="bi bi-circle-fill me-1" style="font-size:0.5rem"></i>Dang choi
                            </span>
                            <span th:if="${table.status.name() == 'PAUSED'}" class="status-paused">
                                <i class="bi bi-pause-circle-fill me-1" style="font-size:0.5rem"></i>Tam dung
                            </span>
                            <span th:if="${table.status.name() == 'RESERVED'}" class="status-reserved">
                                <i class="bi bi-bookmark-fill me-1" style="font-size:0.5rem"></i>Dat truoc
                            </span>
                            <span th:if="${table.status.name() == 'MAINTENANCE'}" class="status-maintenance">
                                <i class="bi bi-wrench me-1" style="font-size:0.5rem"></i>Bao tri
                            </span>
                            <span th:if="${table.status.name() == 'DISABLED'}" class="status-maintenance" style="color:#999">
                                <i class="bi bi-ban me-1" style="font-size:0.5rem"></i>Ngung hoat dong
                            </span>
                        </td>
                        <td th:text="${#temporals.format(table.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary me-1"
                                    data-bs-toggle="modal" data-bs-target="#editModal"
                                    th:data-id="${table.id}"
                                    th:data-name="${table.name}"
                                    th:data-type="${table.tableType}">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <form th:action="@{/admin/tables/{id}/disable(id=${table.id})}"
                                  method="post" class="d-inline"
                                  th:if="${table.status.name() == 'AVAILABLE'}">
                                <button type="submit" class="btn btn-sm btn-outline-warning me-1"
                                        title="Ngừng hoạt động bàn">
                                    <i class="bi bi-pause-circle"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/tables/{id}/enable(id=${table.id})}"
                                  method="post" class="d-inline"
                                  th:if="${table.status.name() == 'DISABLED'}">
                                <button type="submit" class="btn btn-sm btn-outline-success me-1"
                                        title="Kích hoạt lại bàn">
                                    <i class="bi bi-play-circle"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/tables/{id}/delete(id=${table.id})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Xác nhận xóa bàn này?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                        th:disabled="${table.status.name() != 'AVAILABLE' && table.status.name() != 'DISABLED'}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tables)}">
                        <td colspan="6" class="text-center text-muted py-4">Chưa có bàn nào</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p class="text-muted mt-3">
        <i class="bi bi-info-circle me-1"></i>
        Tổng: <strong th:text="${#lists.size(tables)}">0</strong> bàn
    </p>
</div>

<!-- Modal sửa bàn -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="editForm" method="post">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Sửa thông tin bàn</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tên bàn</label>
                        <input type="text" name="name" id="editName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Loại bàn</label>
                        <select name="tableType" id="editType" class="form-select" required>
                            <option th:each="type : ${tableTypes}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Cập nhật
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Fill edit modal with data
    document.getElementById('editModal').addEventListener('show.bs.modal', function (e) {
        const btn = e.relatedTarget;
        const id = btn.getAttribute('data-id');
        const name = btn.getAttribute('data-name');
        const type = btn.getAttribute('data-type');

        document.getElementById('editForm').action = '/admin/tables/' + id + '/edit';
        document.getElementById('editName').value = name;
        document.getElementById('editType').value = type;
    });

    // Auto-dismiss alerts
    setTimeout(function() {
        document.querySelectorAll('.alert').forEach(function(el) {
            new bootstrap.Alert(el).close();
        });
    }, 4000);
</script>

</body>
</html>
