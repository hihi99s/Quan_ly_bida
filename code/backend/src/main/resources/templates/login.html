<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng nhập - Quản Lý Quán Bida</title>

    <!-- Bootstrap 5.3.3 -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <style>
        /* =============================================
           Page Layout
        ============================================= */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 1rem;
        }

        /* =============================================
           Card
        ============================================= */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.97);
            overflow: hidden;
        }

        /* =============================================
           Header strip
        ============================================= */
        .login-header {
            background: linear-gradient(135deg, #e44d26 0%, #c0392b 100%);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            color: #fff;
        }

        .login-header .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: .4rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,.3));
        }

        .login-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: .4px;
            margin-bottom: .2rem;
        }

        .login-header p {
            font-size: .82rem;
            opacity: .85;
            margin: 0;
        }

        /* =============================================
           Body
        ============================================= */
        .login-body {
            padding: 2rem 2rem 1.75rem;
        }

        /* =============================================
           Form controls
        ============================================= */
        .form-label {
            font-weight: 600;
            font-size: .875rem;
            color: #374151;
            margin-bottom: .35rem;
        }

        .input-group-text {
            background-color: #f3f4f6;
            border-right: none;
            color: #6b7280;
        }

        .form-control {
            border-left: none;
            padding: .6rem .85rem;
            font-size: .9rem;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(228, 77, 38, .18);
            border-color: #e44d26;
            outline: none;
        }

        .input-group:focus-within .input-group-text {
            border-color: #e44d26;
            color: #e44d26;
        }

        /* =============================================
           Password toggle
        ============================================= */
        .toggle-password {
            cursor: pointer;
            background-color: #f3f4f6;
            border-left: none;
            color: #6b7280;
            transition: color .2s;
        }

        .toggle-password:hover {
            color: #e44d26;
        }

        /* =============================================
           Submit button
        ============================================= */
        .btn-login {
            background: linear-gradient(135deg, #e44d26 0%, #c0392b 100%);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            padding: .7rem;
            letter-spacing: .3px;
            color: #fff;
            width: 100%;
            transition: opacity .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 4px 15px rgba(228, 77, 38, .35);
        }

        .btn-login:hover {
            opacity: .92;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(228, 77, 38, .4);
            color: #fff;
        }

        .btn-login:active {
            transform: translateY(0);
            opacity: 1;
        }

        /* =============================================
           Alerts
        ============================================= */
        .alert {
            border-radius: 10px;
            font-size: .875rem;
            padding: .75rem 1rem;
        }

        .alert-danger {
            background-color: #fef2f2;
            border-color: #fecaca;
            color: #b91c1c;
        }

        .alert-success {
            background-color: #f0fdf4;
            border-color: #bbf7d0;
            color: #15803d;
        }

        /* =============================================
           Footer
        ============================================= */
        .login-footer {
            text-align: center;
            padding: 0 2rem 1.5rem;
            font-size: .78rem;
            color: #9ca3af;
        }

        /* =============================================
           Billiard ball decoration (pure CSS)
        ============================================= */
        .ball-decoration {
            display: flex;
            justify-content: center;
            gap: .5rem;
            margin-bottom: 1.25rem;
        }

        .ball {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,.3);
        }

        .ball-1  { background: #f59e0b; }
        .ball-2  { background: #3b82f6; }
        .ball-3  { background: #ef4444; }
        .ball-4  { background: #8b5cf6; }
        .ball-5  { background: #10b981; }
    </style>
</head>

<body>
<div class="login-wrapper">
    <div class="login-card card">

        <!-- ===== Header ===== -->
        <div class="login-header">
            <span class="logo-icon">🎱</span>
            <h1>Quản Lý Quán Bida</h1>
            <p>Vui lòng đăng nhập để tiếp tục</p>
        </div>

        <!-- ===== Body ===== -->
        <div class="login-body">

            <!-- Billiard ball decoration -->
            <div class="ball-decoration">
                <div class="ball ball-1"></div>
                <div class="ball ball-2"></div>
                <div class="ball ball-3"></div>
                <div class="ball ball-4"></div>
                <div class="ball ball-5"></div>
            </div>

            <!-- Alert: Login error -->
            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 mb-3" role="alert">
                <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
                <span>Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.</span>
            </div>

            <!-- Alert: Logged out successfully -->
            <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2 mb-3" role="alert">
                <i class="bi bi-check-circle-fill flex-shrink-0"></i>
                <span>Bạn đã đăng xuất thành công.</span>
            </div>

            <!-- ===== Login Form ===== -->
            <form th:action="@{/login}" method="POST" autocomplete="off" novalidate>

                <!-- CSRF token is injected automatically by Thymeleaf + Spring Security -->

                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person me-1"></i>Tên đăng nhập
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-control"
                            placeholder="Nhập tên đăng nhập"
                            required
                            autofocus
                            autocomplete="username"
                        />
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-1"></i>Mật khẩu
                    </label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Nhập mật khẩu"
                            required
                            autocomplete="current-password"
                        />
                        <button
                            class="btn border toggle-password"
                            type="button"
                            id="togglePassword"
                            title="Hiện/ẩn mật khẩu"
                            aria-label="Hiện hoặc ẩn mật khẩu"
                        >
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                </button>

            </form>
        </div>

        <!-- ===== Footer ===== -->
        <div class="login-footer">
            <i class="bi bi-shield-lock me-1"></i>
            Hệ thống được bảo mật &bull; &copy; 2026 Quản Lý Quán Bida
        </div>

    </div><!-- /.login-card -->
</div><!-- /.login-wrapper -->

<!-- Bootstrap 5 JS Bundle -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmYPaRoiNRgm5+/5X8OHIBzF1RF7"
    crossorigin="anonymous">
</script>

<!-- Toggle password visibility -->
<script>
    (function () {
        const btn  = document.getElementById('togglePassword');
        const pwd  = document.getElementById('password');
        const icon = document.getElementById('toggleIcon');

        btn.addEventListener('click', function () {
            const isHidden = pwd.type === 'password';
            pwd.type        = isHidden ? 'text' : 'password';
            icon.className  = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
            btn.title       = isHidden ? 'Ẩn mật khẩu' : 'Hiện mật khẩu';
        });
    })();
</script>
</body>
</html>
