# ===================================================================
# Dev profile overrides (local development)
# Activate with: --spring.profiles.active=dev
# ===================================================================

# ---- Database (overrides) -----------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bida_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ---- JPA / Hibernate ----------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ---- Logging ------------------------------------------------------
logging.level.com.bida=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ---- Thymeleaf / Static -------------------------------------------
spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
